<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE MONITOR - PROYEKTOR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; overflow: hidden; }
        .font-mono-kpu { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- CONTAINER UTAMA (AUTO FULLSCREEN PADA PROYEKTOR) -->
    <main id="monitor_view" class="w-full h-full flex flex-col items-center justify-center gap-10">
        
        <h1 class="text-6xl font-black text-white uppercase tracking-widest border-b-4 border-indigo-500 pb-4">Live Count Monitoring</h1>

        <section class="flex flex-row gap-16 w-full justify-center items-center">
            <!-- DIAGRAM LINGKARAN RAKSASA -->
            <div class="relative w-[500px] h-[500px] flex items-center justify-center">
                <canvas id="kpuDoughnutChartProyektor"></canvas>
                <div class="absolute text-center">
                    <span class="text-xl font-black text-slate-400 block uppercase tracking-widest">Suara Masuk</span>
                    <span id="chart_center_total" class="text-9xl font-black text-white font-mono-kpu block mt-4">0</span>
                </div>
            </div>

            <!-- PAPAN SKOR RAKSASA -->
            <div id="paslon_kpu_container" class="w-[600px] space-y-6">
                <!-- Data akan diisi via JS -->
            </div>
        </section>
    </main>

    <script>
        let doughnutChartInstance = null;
        const chartColors = ['#4f46e5', '#f59e0b', '#10b981', '#ec4899', '#06b6d4', '#8b5cf6'];

        function initDoughnut() {
            const ctx = document.getElementById('kpuDoughnutChartProyektor').getContext('2d');
            doughnutChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: chartColors, borderWidth: 8, borderColor: '#020617' }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false } },
                    animation: { duration: 1000, easing: 'easeOutQuart' }
                }
            });
        }

        async function syncProyektorData() {
            const response = await fetch('/api/superadmin/dashboard-stats');
            const result = await response.json();
            if (result.status === "success") {
                const s = result.data.summary;
                const pList = result.data.paslon_votes;
                const total = s.sudah_memilih ?? 0;

                document.getElementById('chart_center_total').innerText = total;

                if (doughnutChartInstance) {
                    doughnutChartInstance.data.labels = pList.map(p => p.nomor_urut);
                    doughnutChartInstance.data.datasets[0].data = pList.map(p => p.total_suara);
                    doughnutChartInstance.update();
                }

                document.getElementById('paslon_kpu_container').innerHTML = pList.map((p, i) => {
                    const persen = total > 0 ? ((p.total_suara / total) * 100).toFixed(2) : "0.00";
                    return `
                        <div class="bg-slate-900 border-4 border-slate-800 p-8 rounded-3xl flex items-center justify-between">
                            <div class="flex items-center gap-6">
                                <div class="w-24 h-24 flex flex-col items-center justify-center rounded-2xl text-4xl font-black text-white" style="border:5px solid ${chartColors[i%6]}">
                                    ${p.nomor_urut}
                                </div>
                                <div>
                                    <h4 class="text-4xl font-black text-white">${p.nama_ketua}</h4>
                                    <p class="text-2xl text-slate-400 font-bold">${p.nama_wakil}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-7xl font-black font-mono-kpu text-white">${persen}%</span>
                            </div>
                        </div>`;
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => { 
            initDoughnut(); 
            syncProyektorData(); 
            setInterval(syncProyektorData, 5000); 
            // Opsional: Klik layar untuk otomatis fullscreen
            document.body.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            });
        });
    </script>
</body>
</html>
