<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandi Baru Operator - E-Voting OSIS 2026</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Cyber Card */
        .cyber-card-giant { 
            background: rgba(6, 11, 25, 0.65); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 2px rgba(255, 255, 255, 0.12);
        }

        /* Ambient Glow Backplate (Tema Emerald Cyber) */
        .ambient-glow-giant {
            position: absolute;
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(16, 185, 129, 0.2) 0%, rgba(13, 148, 136, 0.04) 60%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            filter: blur(50px);
        }

        /* Animasi Laser Scanner Emerald */
        .cyber-scanner-box {
            position: relative;
            overflow: hidden;
        }
        .cyber-scanner-box::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #10b981, #0d9488, #10b981, transparent);
            box-shadow: 0 0 15px #10b981, 0 0 30px #0d9488;
            animation: cyberScanMassive 2.5s ease-in-out infinite;
        }

        @keyframes cyberScanMassive {
            0%, 100% { top: 0%; opacity: 0; }
            5%, 95% { opacity: 1; }
            50% { top: 100%; }
        }

        /* Focus State Input */
        .input-glow-massive:focus-within {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.85);
            background: #000000 !important;
            transform: scale(1.005);
        }

        /* ANIMASI TOMBOL: AWAL GRADASI BERWARNA -> HOVER JADI GELAP DENGAN BORDER GRADASI NEON EMERALD */
        .btn-cyber-emerald {
            position: relative;
            background: linear-gradient(90deg, #059669, #0d9488);
            border: 2px solid transparent;
            z-index: 1;
            transition: all 0.4s ease-in-out;
        }
        
        .btn-cyber-emerald::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #020617; /* Efek menggelap di dalam area button */
            border-radius: 10px; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .btn-cyber-emerald:hover::before {
            opacity: 1;
        }

        .btn-cyber-emerald:hover {
            color: #10b981;
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-hidden selection:bg-emerald-500 selection:text-white">

    <!-- Ornamen Latar Belakang Aura Elektrik Emerald -->
    <div class="absolute -top-80 -right-80 w-[600px] h-[600px] bg-emerald-600/5 rounded-full blur-[150px] pointer-events-none"></div>
    <div class="absolute -bottom-80 -left-80 w-[600px] h-[600px] bg-teal-600/5 rounded-full blur-[150px] pointer-events-none"></div>

    <div class="relative w-full max-w-4xl transition-all duration-500">
        <!-- Glow Backplate -->
        <div class="ambient-glow-giant"></div>

        <!-- MAIN CARD -->
        <div class="cyber-card-giant border border-slate-800/60 rounded-[32px] p-6 sm:p-10 lg:py-14 lg:px-12 relative z-10">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-center min-h-[380px]">
                
                <!-- SISI KIRI: BRANDING & SCANNER BOX -->
                <div class="lg:col-span-5 text-center lg:text-left space-y-6 lg:border-r border-slate-800/40 pb-6 lg:pb-0 lg:pr-10 h-full flex flex-col justify-center min-w-0">
                    <div class="inline-flex relative mx-auto lg:mx-0 w-24 h-24">
                        <div class="absolute inset-0 bg-gradient-to-tr from-emerald-500 to-teal-500 rounded-2xl blur-2xl opacity-40"></div>
                        
                        <!-- Box Scanner dengan Ikon Brankas Server Aman -->
                        <div class="cyber-scanner-box relative bg-slate-950 p-5 rounded-2xl border border-emerald-500/30 flex items-center justify-center shadow-xl h-24 w-24 z-10">
                            <i class="bi bi-safe2 text-5xl text-emerald-400 animate-pulse block"></i>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <h1 class="text-3xl sm:text-4xl lg:text-4xl font-black tracking-tight text-white leading-tight text-center lg:text-left">
                            <span class="block">SANDI BARU</span>
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500 font-black block mt-0.5">OPERATOR</span>
                        </h1>
                        <p class="text-[10px] font-bold tracking-[0.2em] text-emerald-400/80 uppercase block pt-0.5 text-center lg:text-left">
                            SECURE CREDENTIAL CONFIGURATION
                        </p>
                        <p class="text-xs sm:text-sm text-slate-400 font-medium leading-relaxed max-w-sm mx-auto lg:mx-0 pt-1 text-center lg:text-left">
                            Setel ulang kata sandi akses panel untuk pengguna <span class="text-emerald-400 font-mono font-bold">@{{ username }}</span>. Gunakan kombinasi karakter yang kuat demi keamanan sistem.
                        </p>
                    </div>
                </div>

                <!-- SISI KANAN: FORM INPUT STEPS (MATRIKS DEAD CENTER) -->
                <div class="lg:col-span-7 w-full lg:pl-6 h-full flex flex-col justify-center items-center">
                    <form id="reset_password_form" onsubmit="handleResetPassword(event)" class="w-full my-auto space-y-5">
                        <input type="hidden" id="reset_username" value="{{ username }}">
                        
                        <!-- INPUT PASSWORD BARU -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-xs font-bold text-slate-300 uppercase tracking-wider">
                                <i class="bi bi-key-fill text-emerald-400 text-lg"></i> Kata Sandi Baru
                            </label>
                            <div class="input-glow-massive flex items-center bg-slate-950/80 border border-slate-800 rounded-xl transition-all duration-300 shadow-md">
                                <input type="password" id="reset_password" required 
                                    class="w-full bg-transparent text-white placeholder-slate-700 focus:outline-none px-4 py-3.5 text-sm font-semibold tracking-wide"
                                    placeholder="Masukkan sandi baru...">
                            </div>
                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-xs font-bold text-slate-300 uppercase tracking-wider">
                                <i class="bi bi-check-all text-emerald-400 text-lg"></i> Konfirmasi Kata Sandi
                            </label>
                            <div class="input-glow-massive flex items-center bg-slate-950/80 border border-slate-800 rounded-xl transition-all duration-300 shadow-md">
                                <input type="password" id="reset_confirm_password" required 
                                    class="w-full bg-transparent text-white placeholder-slate-700 focus:outline-none px-4 py-3.5 text-sm font-semibold tracking-wide"
                                    placeholder="Ulangi sandi baru...">
                            </div>
                        </div>

                        <!-- TOMBOL SUBMIT -->
                        <div class="pt-2">
                            <button type="submit" 
                                class="w-full relative group btn-cyber-emerald text-white font-bold py-3 px-5 rounded-xl text-sm tracking-wider uppercase flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/10 active:scale-[0.995]">
                                <i class="bi bi-shield-lock-fill text-base group-hover:rotate-12 transition-transform"></i> 
                                Perbarui & Simpan Akses
                            </button>
                        </div>

                        <!-- FOOTER KEMBALI KE LOGIN -->
                        <div class="pt-4 border-t border-slate-900 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs w-full">
                            <span class="text-slate-500 font-semibold">Ingat kunci password Anda?</span>
                            <a href="/auth/login" class="text-emerald-400 font-bold hover:text-emerald-300 transition-colors flex items-center gap-1 group">
                                Kembali Ke Login <i class="bi bi-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                            </a>
                        </div>
                    </form>
                </div>

            </div> <!-- END GRID -->
        </div> <!-- END CARD -->
    </div>

    <script>
        async function handleResetPassword(e) {
            e.preventDefault();
            const username = document.getElementById('reset_username').value;
            const password = document.getElementById('reset_password').value;
            const confirmPassword = document.getElementById('reset_confirm_password').value;

            if (password !== confirmPassword) {
                Swal.fire('Password Tidak Cocok', 'Konfirmasi kata sandi harus sama dengan kata sandi baru Anda!', 'warning');
                return;
            }

            if (password.length < 6) {
                Swal.fire('Terlalu Pendek', 'Kata sandi baru minimal harus 6 karakter demi keamanan!', 'warning');
                return;
            }

            Swal.fire({
                title: 'Menyimpan Sandi...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch('/api/forgot-password/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        otp: "BYPASS_WA_LINK"
                    })
                });

                const result = await response.json();
                Swal.close();

                if (response.ok && result.status === "success") {
                    Swal.fire({
                        title: 'Berhasil!',
                        text: 'Kata sandi panel operator Anda telah diperbarui. Silakan login.',
                        icon: 'success'
                    }).then(() => {
                        location.href = '/auth/login';
                    });
                } else {
                    Swal.fire('Gagal Mereset', result.message || 'Tautan kedaluwarsa atau tidak valid.', 'error');
                }
            } catch {
                Swal.close();
                Swal.fire('Error', 'Gagal berkomunikasi dengan server database.', 'error');
            }
        }
    </script>
</body>
</html>
