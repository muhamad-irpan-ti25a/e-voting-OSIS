<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemulihan Kunci Akses - E-Voting OSIS 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Cyber Card */
        .cyber-card-giant { 
            background: rgba(6, 11, 25, 0.65); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 2px rgba(255, 255, 255, 0.12);
        }

        /* Ambient Glow Backplate */
        .ambient-glow-giant {
            position: absolute;
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(249, 115, 22, 0.2) 0%, rgba(245, 158, 11, 0.04) 60%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            filter: blur(50px);
        }

        /* Animasi Laser Scanner */
        .cyber-scanner-box {
            position: relative;
            overflow: hidden;
        }
        .cyber-scanner-box::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #f97316, #f59e0b, #f97316, transparent);
            box-shadow: 0 0 15px #f97316, 0 0 30px #f59e0b;
            animation: cyberScanMassive 2.5s ease-in-out infinite;
        }

        @keyframes cyberScanMassive {
            0%, 100% { top: 0%; opacity: 0; }
            5%, 95% { opacity: 1; }
            50% { top: 100%; }
        }

        /* Focus State Input */
        .input-glow-massive:focus-within {
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.25);
            border-color: rgba(249, 115, 22, 0.85);
            background: #000000 !important;
            transform: scale(1.005);
        }

        /* ANIMASI TOMBOL: AWAL GRADASI BERWARNA -> HOVER JADI GELAP DENGAN BORDER GRADASI NEON */
        .btn-cyber-orange {
            position: relative;
            background: linear-gradient(90deg, #ea580c, #f59e0b);
            border: 2px solid transparent;
            z-index: 1;
            transition: all 0.4s ease-in-out;
        }
        
        .btn-cyber-orange::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #020617; /* Menggelap saat di-hover */
            border-radius: 10px; /* Menyesuaikan xl rounded */
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .btn-cyber-orange:hover::before {
            opacity: 1;
        }

        .btn-cyber-orange:hover {
            color: #f97316;
            border-color: #f97316;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-hidden selection:bg-orange-500 selection:text-white">

    <div class="absolute -top-80 -right-80 w-[600px] h-[600px] bg-orange-600/5 rounded-full blur-[150px] pointer-events-none"></div>
    <div class="absolute -bottom-80 -left-80 w-[600px] h-[600px] bg-amber-600/5 rounded-full blur-[150px] pointer-events-none"></div>

    <div class="relative w-full max-w-4xl transition-all duration-500">
        <div class="ambient-glow-giant"></div>

        <div class="cyber-card-giant border border-slate-800/60 rounded-[32px] p-6 sm:p-10 lg:py-14 lg:px-12 relative z-10">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-center min-h-[380px]">
                
                <div class="lg:col-span-5 text-center lg:text-left space-y-6 lg:border-r border-slate-800/40 pb-6 lg:pb-0 lg:pr-10 h-full flex flex-col justify-center min-w-0">
                    <div class="inline-flex relative mx-auto lg:mx-0 w-24 h-24">
                        <div class="absolute inset-0 bg-gradient-to-tr from-orange-500 to-amber-500 rounded-2xl blur-2xl opacity-40"></div>
                        
                        <div class="cyber-scanner-box relative bg-slate-950 p-5 rounded-2xl border border-orange-500/30 flex items-center justify-center shadow-xl h-24 w-24 z-10">
                            <i class="bi bi-shield-exclamation text-5xl text-orange-400 animate-pulse block"></i>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <h1 class="text-3xl sm:text-4xl lg:text-4xl font-black tracking-tight text-white leading-tight text-center lg:text-left">
                            <span class="block">RESET</span>
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-500 font-black block mt-0.5">PASSWORD</span>
                        </h1>
                        <p class="text-[10px] font-bold tracking-[0.2em] text-orange-400/80 uppercase block pt-0.5 text-center lg:text-left">
                            SECURE CREDENTIAL RECOVERY SYSTEM
                        </p>
                        <p class="text-xs sm:text-sm text-slate-400 font-medium leading-relaxed max-w-sm mx-auto lg:mx-0 pt-1 text-center lg:text-left">
                            Masukkan identitas akun pemilih Anda. Sistem akan melakukan sinkronisasi otomatis token OTP via WhatsApp Gateway.
                        </p>
                    </div>
                </div>

                <div class="lg:col-span-7 w-full lg:pl-6 h-full flex flex-col justify-center items-center">
                    <div class="w-full my-auto space-y-5">
                        
                        <div id="forgot_step1" class="space-y-4 w-full">
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-300 uppercase tracking-wider">
                                    <i class="bi bi-person-badge-fill text-orange-400 text-lg"></i> Identitas Akun (NISN / NIP)
                                </label>
                                <div class="input-glow-massive flex items-center bg-slate-950/80 border border-slate-800 rounded-xl transition-all duration-300 shadow-md">
                                    <input type="text" id="forgot_username" required 
                                        class="w-full bg-transparent text-white placeholder-slate-700 focus:outline-none px-4 py-3.5 text-sm font-semibold tracking-wide"
                                        placeholder="Masukkan Username Anda">
                                </div>
                            </div>

                            <div class="pt-2">
                                <button onclick="requestForgotOTP()" 
                                    class="w-full relative group btn-cyber-orange text-white font-bold py-3 px-5 rounded-xl text-sm tracking-wider uppercase flex items-center justify-center gap-2 shadow-lg shadow-orange-500/10 active:scale-[0.995]">
                                    <i class="bi bi-unlock-fill text-base group-hover:rotate-12 transition-transform"></i> 
                                    Minta OTP Pemulihan
                                </button>
                            </div>
                        </div>

                        <div id="forgot_step2" class="space-y-4 w-full hidden">
                            <div class="bg-orange-500/10 border border-orange-500/20 p-3 rounded-xl text-xs text-orange-400 text-center font-bold shadow-inner">
                                <i class="bi bi-chat-left-dots-fill mr-1.5"></i> Sinkronisasi Berhasil: OTP terkirim ke WhatsApp Anda.
                            </div>
                            
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-300 uppercase tracking-wider">
                                    <i class="bi bi-shield-check text-orange-400 text-lg"></i> Masukkan Kode OTP
                                </label>
                                <div class="input-glow-massive flex items-center bg-slate-950/80 border border-slate-800 rounded-xl transition-all duration-300 shadow-md">
                                    <input type="text" id="forgot_otp" maxlength="6" 
                                        class="w-full bg-transparent text-white focus:outline-none px-4 py-2.5 text-xl font-black text-center tracking-[0.4em]"
                                        placeholder="000000">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-300 uppercase tracking-wider">
                                    <i class="bi bi-key-fill text-orange-400 text-lg"></i> Buat Password Baru Anda
                                </label>
                                <div class="input-glow-massive flex items-center bg-slate-950/80 border border-slate-800 rounded-xl transition-all duration-300 shadow-md">
                                    <input type="password" id="forgot_password_new" required 
                                        class="w-full bg-transparent text-white placeholder-slate-700 focus:outline-none px-4 py-3.5 text-sm font-semibold tracking-widest"
                                        placeholder="••••••••">
                            </div>
                        </div>

                        <div class="pt-2">
                            <button onclick="verifyForgot()" 
                                class="w-full relative group btn-cyber-orange text-white font-bold py-3 px-5 rounded-xl text-sm tracking-wider uppercase flex items-center justify-center gap-2 shadow-lg shadow-orange-500/10 active:scale-[0.995]">
                                <i class="bi bi-unlock-fill text-base group-hover:rotate-12 transition-transform"></i> 
                                Perbarui Password
                            </button>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-slate-900 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs w-full">
                        <span class="text-slate-500 font-semibold">Ingat kunci password Anda?</span>
                        <a href="/auth/login" class="text-orange-400 font-bold hover:text-orange-300 transition-colors flex items-center gap-1 group">
                            Kembali Login <i class="bi bi-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>

                </div>
            </div>

            </div> </div> </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
